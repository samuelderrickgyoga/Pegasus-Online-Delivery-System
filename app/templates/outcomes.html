<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outcomes - Capstone Project Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex">
    <!-- Mobile Menu Button -->
    <button onclick="toggleMobileMenu()" class="lg:hidden fixed top-4 left-4 z-50 p-2 bg-white rounded-md shadow-md">
        <i class="fas fa-bars text-gray-600"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:relative lg:translate-x-0 -translate-x-full transition-transform duration-300 ease-in-out z-40 w-64 bg-white shadow-lg border-r border-gray-100 p-4 lg:p-6 flex flex-col h-full">
        <div class="flex items-center mb-6 lg:mb-10">
            <div class="h-10 lg:h-12 w-10 lg:w-12 bg-blue-600 rounded-full flex items-center justify-center">
                <i class="fas fa-project-diagram text-white text-lg lg:text-xl"></i>
            </div>
            <span class="ml-3 font-bold text-lg lg:text-xl text-gray-900">Dashboard</span>
        </div>
        <nav class="flex flex-col space-y-2 lg:space-y-4">
            <a href="{{ url_for('main.index') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-home mr-3"></i> Home
            </a>
            <a href="{{ url_for('main.programs') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-list mr-3"></i> Programs
            </a>
            <a href="{{ url_for('main.facilities') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-building mr-3"></i> Facilities
            </a>
            <a href="{{ url_for('main.equipment') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-tools mr-3"></i> Equipment
            </a>
            <a href="{{ url_for('main.projects') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-cogs mr-3"></i> Projects
            </a>
            <a href="{{ url_for('main.participants') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-users mr-3"></i> Participants
            </a>
            <a href="{{ url_for('main.outcomes') }}" class="flex items-center text-blue-600 font-semibold p-2 rounded bg-blue-50 text-sm lg:text-base">
                <i class="fas fa-chart-line mr-3"></i> Outcomes
            </a>
            <a href="{{ url_for('main.services') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-wrench mr-3"></i> Services
            </a>
        </nav>
    </aside>
    
    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="hidden lg:hidden fixed inset-0 bg-black bg-opacity-50 z-40" onclick="toggleMobileMenu()"></div>
    <!-- Main Content -->
    <main class="flex-1 p-4 lg:p-8 overflow-y-auto">
        <!-- Header -->
        <div class="mb-6 lg:mb-8">
            <h1 class="text-2xl lg:text-3xl font-bold text-gray-900 mb-2">Outcomes</h1>
            <p class="text-sm lg:text-base text-gray-600">Manage and view all project outcomes</p>
        </div>
        
        <!-- Create Outcome Form -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-plus text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Create New Outcome</h3>
                </div>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="project_id" class="block text-sm font-medium text-gray-700">Project</label>
                        <select id="project_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <option value="">Select Project</option>
                        </select>
                    </div>
                    <div>
                        <label for="outcome_type" class="block text-sm font-medium text-gray-700">Outcome Type</label>
                        <select id="outcome_type" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <option value="">Select Type</option>
                            <option value="CAD">CAD</option>
                            <option value="PCB">PCB</option>
                            <option value="Prototype">Prototype</option>
                            <option value="Report">Report</option>
                            <option value="Software">Software</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
                    <input type="text" id="title" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="description" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="3"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="artifact_link" class="block text-sm font-medium text-gray-700">Artifact Link</label>
                        <input type="url" id="artifact_link" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="quality_certification" class="block text-sm font-medium text-gray-700">Quality Certification</label>
                        <input type="text" id="quality_certification" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                </div>
                <div>
                    <label for="commercialization_status" class="block text-sm font-medium text-gray-700">Commercialization Status</label>
                    <select id="commercialization_status" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="">Select Status</option>
                        <option value="Concept">Concept</option>
                        <option value="Demoed">Demoed</option>
                        <option value="Launched">Launched</option>
                        <option value="In Development">In Development</option>
                    </select>
                </div>
                <button id="create-outcome" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create Outcome</button>
            </div>
        </div>
        
        <!-- Outcomes List -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-chart-line text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Outcome List</h3>
                    <p id="outcomes-count" class="text-gray-500">Loading...</p>
                </div>
            </div>
            <div id="outcomes-list" class="text-sm text-gray-600">
                <div class="grid gap-4" id="outcome-items"></div>
            </div>
        </div>
    </main>
    
    <script>
        // Mobile menu functionality
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('translate-x-0')) {
                // Close menu
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                // Open menu
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            }
        }

        let projects = [];
        
        // Fetch projects for dropdown
        async function fetchProjects() {
            try {
                const response = await fetch('/api/projects/');
                projects = await response.json();
                const projectSelect = document.getElementById('project_id');
                projectSelect.innerHTML = '<option value="">Select Project</option>';
                projects.forEach(project => {
                    const option = document.createElement('option');
                    option.value = project.id;
                    option.textContent = project.title;
                    projectSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching projects:', error);
            }
        }
        
        // Fetch all outcomes on page load
        async function fetchOutcomes() {
            try {
                const response = await fetch('/api/outcomes/');
                const outcomes = await response.json();
                const outcomeList = document.getElementById('outcome-items');
                const outcomeCount = document.getElementById('outcomes-count');
                
                if (response.ok) {
                    outcomeCount.textContent = `Total Outcomes: ${outcomes.length}`;
                    outcomeList.innerHTML = '';
                    outcomes.forEach(outcome => {
                        const project = projects.find(p => p.id === outcome.project_id);
                        const card = document.createElement('div');
                        card.className = 'border rounded-lg p-4 bg-gray-50';
                        card.innerHTML = `
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-semibold text-gray-900">${outcome.title}</h4>
                                <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">${outcome.outcome_type || 'N/A'}</span>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${outcome.description || 'No description'}</p>
                            <div class="text-xs text-gray-500">
                                <p><strong>Project:</strong> ${project ? project.title : 'Unknown'}</p>
                                <p><strong>Status:</strong> ${outcome.commercialization_status || 'N/A'}</p>
                                ${outcome.artifact_link ? `<p><strong>Link:</strong> <a href="${outcome.artifact_link}" target="_blank" class="text-blue-600">View Artifact</a></p>` : ''}
                            </div>
                            <div class="mt-2 flex justify-end space-x-2">
                                <button onclick="editOutcome(${outcome.id})" class="text-blue-600 hover:text-blue-800">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteOutcome(${outcome.id})" class="text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        `;
                        outcomeList.appendChild(card);
                    });
                } else {
                    outcomeCount.textContent = 'Error loading outcomes';
                    outcomeList.innerHTML = `<p class="text-red-500">${outcomes.error}</p>`;
                }
            } catch (error) {
                document.getElementById('outcomes-count').textContent = 'Error loading outcomes';
                document.getElementById('outcome-items').innerHTML = `<p class="text-red-500">Failed to load outcomes: ${error.message}</p>`;
            }
        }

        // Create a new outcome
        document.getElementById('create-outcome').addEventListener('click', async () => {
            const outcomeData = {
                project_id: parseInt(document.getElementById('project_id').value),
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                outcome_type: document.getElementById('outcome_type').value,
                artifact_link: document.getElementById('artifact_link').value,
                quality_certification: document.getElementById('quality_certification').value,
                commercialization_status: document.getElementById('commercialization_status').value
            };

            if (!outcomeData.project_id || !outcomeData.title) {
                alert('Please select a project and enter a title');
                return;
            }

            try {
                const response = await fetch('/api/outcomes/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(outcomeData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Outcome created successfully!');
                    fetchOutcomes();
                    // Clear form
                    document.getElementById('project_id').value = '';
                    document.getElementById('title').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('outcome_type').value = '';
                    document.getElementById('artifact_link').value = '';
                    document.getElementById('quality_certification').value = '';
                    document.getElementById('commercialization_status').value = '';
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to create outcome: ${error.message}`);
            }
        });

        // Edit an outcome
        async function editOutcome(outcomeId) {
            const outcomeData = {
                title: prompt('Enter new outcome title:'),
                description: prompt('Enter new description:'),
                artifact_link: prompt('Enter new artifact link:'),
                quality_certification: prompt('Enter quality certification:'),
                commercialization_status: prompt('Enter commercialization status:')
            };

            Object.keys(outcomeData).forEach(key => {
                if (!outcomeData[key]) delete outcomeData[key];
            });

            try {
                const response = await fetch(`/api/outcomes/${outcomeId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(outcomeData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Outcome updated successfully!');
                    fetchOutcomes();
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to update outcome: ${error.message}`);
            }
        }

        // Delete an outcome
        async function deleteOutcome(outcomeId) {
            if (confirm('Are you sure you want to delete this outcome?')) {
                try {
                    const response = await fetch(`/api/outcomes/${outcomeId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Outcome deleted successfully!');
                        fetchOutcomes();
                    } else {
                        const result = await response.json();
                        alert(`Error: ${result.error}`);
                    }
                } catch (error) {
                    alert(`Failed to delete outcome: ${error.message}`);
                }
            }
        }

        // Initial fetch
        document.addEventListener('DOMContentLoaded', async () => {
            await fetchProjects();
            await fetchOutcomes();
        });
    </script>
</body>
</html>
