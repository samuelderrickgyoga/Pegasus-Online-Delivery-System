{% extends "base.html" %}

{% block title %}Capstone Project Dashboard{% endblock %}

{% block content %}
        <!-- Header -->
        <div class="mb-6 lg:mb-8">
            <h1 class="text-2xl lg:text-3xl font-bold text-gray-900 mb-2">Programs</h1>
            <p class="text-sm lg:text-base text-gray-600">Manage and view all programs</p>
        </div>
        <!-- Create Program Form -->
        <div class="bg-white p-4 lg:p-6 rounded-xl shadow-lg border border-gray-100 mb-4 lg:mb-6">
            <div class="flex items-center mb-3 lg:mb-4">
                <div class="p-2 lg:p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-plus text-blue-600 text-lg lg:text-xl"></i>
                </div>
                <div class="ml-3 lg:ml-4">
                    <h3 class="text-base lg:text-lg font-semibold text-gray-900">Create New Program</h3>
                </div>
            </div>
            <div class="text-xs lg:text-sm text-gray-600">
                <div class="space-y-3 lg:space-y-4">
                    <div>
                        <label for="name" class="block text-xs lg:text-sm font-medium text-gray-700">Name</label>
                        <input type="text" id="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-xs lg:text-sm">
                    </div>
                    <div>
                        <label for="description" class="block text-xs lg:text-sm font-medium text-gray-700">Description</label>
                        <textarea id="description" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-xs lg:text-sm" rows="3"></textarea>
                    </div>
                    <div>
                        <label for="national_alignment" class="block text-xs lg:text-sm font-medium text-gray-700">National Alignment</label>
                        <input type="text" id="national_alignment" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-xs lg:text-sm">
                    </div>
                    <div>
                        <label for="focus_areas" class="block text-xs lg:text-sm font-medium text-gray-700">Focus Areas</label>
                        <input type="text" id="focus_areas" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-xs lg:text-sm">
                    </div>
                    <div>
                        <label for="phases" class="block text-xs lg:text-sm font-medium text-gray-700">Phases</label>
                        <input type="text" id="phases" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-xs lg:text-sm">
                    </div>
                    <button id="create-program" class="w-full lg:w-auto px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-xs lg:text-sm">Create Program</button>
                </div>
            </div>
        </div>
        <!-- Programs List -->
        <div class="bg-white p-4 lg:p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex items-center mb-3 lg:mb-4">
                <div class="p-2 lg:p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-folder-open text-blue-600 text-lg lg:text-xl"></i>
                </div>
                <div class="ml-3 lg:ml-4">
                    <h3 class="text-base lg:text-lg font-semibold text-gray-900">Program List</h3>
                    <p id="programs-count" class="text-xs lg:text-sm text-gray-500">Loading...</p>
                </div>
            </div>
            <div id="programs-list" class="text-xs lg:text-sm text-gray-600">
                <ul class="space-y-2" id="program-items"></ul>
            </div>
        </div>

{% endblock %}
{% block scripts %}
    <script>
        // Mobile menu functionality
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('translate-x-0')) {
                // Close menu
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                // Open menu
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            }
        }

        // Fetch all programs on page load
        async function fetchPrograms() {
            try {
                const response = await fetch('/api/programs/');
                const programs = await response.json();
                const programList = document.getElementById('program-items');
                const programCount = document.getElementById('programs-count');
                
                if (response.ok) {
                    programCount.textContent = `Total Programs: ${programs.length}`;
                    programList.innerHTML = '';
                    programs.forEach(program => {
                        const li = document.createElement('li');
                        li.className = 'p-3 lg:p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors';
                        li.innerHTML = `
                            <div class="flex flex-col lg:flex-row lg:justify-between lg:items-start space-y-2 lg:space-y-0">
                                <div class="flex-1">
                                    <h4 class="font-medium text-gray-900 text-sm lg:text-base">${program.name}</h4>
                                    <p class="text-gray-600 mt-1 text-xs lg:text-sm">${program.description || 'No description provided'}</p>
                                    <div class="mt-2 space-y-1">
                                        <p class="text-xs text-gray-500"><strong>Alignment:</strong> ${program.national_alignment || 'Not specified'}</p>
                                        <p class="text-xs text-gray-500"><strong>Focus Areas:</strong> ${program.focus_areas || 'Not specified'}</p>
                                        <p class="text-xs text-gray-500"><strong>Phases:</strong> ${program.phases || 'Not specified'}</p>
                                    </div>
                                </div>
                                <div class="flex space-x-2 lg:ml-4 flex-shrink-0">
                                    <button onclick="editProgram(${program.id})" class="px-2 lg:px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-xs">Edit</button>
                                    <button onclick="deleteProgram(${program.id})" class="px-2 lg:px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700 text-xs">Delete</button>
                                </div>
                            </div>
                        `;
                        programList.appendChild(li);
                    });
                } else {
                    programCount.textContent = 'Error loading programs';
                    programList.innerHTML = `<p class="text-xs lg:text-sm">${programs.error}</p>`;
                }
            } catch (error) {
                document.getElementById('programs-count').textContent = 'Error loading programs';
                document.getElementById('program-items').innerHTML = `<p class="text-xs lg:text-sm">Failed to load programs: ${error.message}</p>`;
            }
        }

        // Create a new program
        document.getElementById('create-program').addEventListener('click', async () => {
            const programData = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                national_alignment: document.getElementById('national_alignment').value,
                focus_areas: document.getElementById('focus_areas').value,
                phases: document.getElementById('phases').value
            };

            try {
                const response = await fetch('/api/programs/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(programData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Program created successfully!');
                    fetchPrograms(); // Refresh the list
                    // Clear form
                    document.getElementById('name').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('national_alignment').value = '';
                    document.getElementById('focus_areas').value = '';
                    document.getElementById('phases').value = '';
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to create program: ${error.message}`);
            }
        });

        // Edit a program (prompt-based for simplicity)
        async function editProgram(programId) {
            const programData = {
                name: prompt('Enter new program name:'),
                description: prompt('Enter new description:'),
                national_alignment: prompt('Enter new national alignment:'),
                focus_areas: prompt('Enter new focus areas:'),
                phases: prompt('Enter new phases:')
            };

            // Remove null/undefined fields
            Object.keys(programData).forEach(key => {
                if (!programData[key]) delete programData[key];
            });

            try {
                const response = await fetch(`/api/programs/${programId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(programData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Program updated successfully!');
                    fetchPrograms(); // Refresh the list
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to update program: ${error.message}`);
            }
        }

        // Delete a program
        async function deleteProgram(programId) {
            if (confirm('Are you sure you want to delete this program?')) {
                try {
                    const response = await fetch(`/api/programs/${programId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Program deleted successfully!');
                        fetchPrograms(); // Refresh the list
                    } else {
                        const result = await response.json();
                        alert(`Error: ${result.error}`);
                    }
                } catch (error) {
                    alert(`Failed to delete program: ${error.message}`);
                }
            }
        }

        // Initial fetch
        fetchPrograms();
    </script>

{% endblock %}
