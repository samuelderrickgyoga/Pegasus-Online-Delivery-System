<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs - Capstone Project Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-lg border-r border-gray-100 p-6 flex flex-col">
        <div class="flex items-center mb-10">
            <div class="h-12 w-12 bg-blue-600 rounded-full flex items-center justify-center">
                <i class="fas fa-project-diagram text-white text-xl"></i>
            </div>
            <span class="ml-3 font-bold text-xl text-gray-900">Dashboard</span>
        </div>
        <nav class="flex flex-col space-y-4">
            <a href="{{ url_for('main.index') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-home mr-3"></i> Home
            </a>
            <a href="{{ url_for('main.programs') }}" class="flex items-center text-blue-600 font-semibold">
                <i class="fas fa-list mr-3"></i> Programs
            </a>
            <a href="{{ url_for('main.facilities') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-building mr-3"></i> Facilities
            </a>
            <a href="{{ url_for('main.equipment') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-tools mr-3"></i> Equipment
            </a>
            <a href="{{ url_for('main.projects') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-cogs mr-3"></i> Projects
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-users mr-3"></i> Participants
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-chart-line mr-3"></i> Outcomes
            </a>
        </nav>
    </aside>
    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Programs</h1>
            <p class="text-gray-600">Manage and view all programs</p>
        </div>
        <!-- Create Program Form -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-plus text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Create New Program</h3>
                </div>
            </div>
            <div class="text-sm text-gray-600">
                <div class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                        <input type="text" id="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                        <textarea id="description" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="4"></textarea>
                    </div>
                    <div>
                        <label for="national_alignment" class="block text-sm font-medium text-gray-700">National Alignment</label>
                        <input type="text" id="national_alignment" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="focus_areas" class="block text-sm font-medium text-gray-700">Focus Areas</label>
                        <input type="text" id="focus_areas" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="phases" class="block text-sm font-medium text-gray-700">Phases</label>
                        <input type="text" id="phases" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <button id="create-program" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create Program</button>
                </div>
            </div>
        </div>
        <!-- Programs List -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-folder-open text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Program List</h3>
                    <p id="programs-count" class="text-gray-500">Loading...</p>
                </div>
            </div>
            <div id="programs-list" class="text-sm text-gray-600">
                <ul class="space-y-2" id="program-items"></ul>
            </div>
        </div>
    </main>
    <script>
        // Fetch all programs on page load
        async function fetchPrograms() {
            try {
                const response = await fetch('/api/programs/');
                const programs = await response.json();
                const programList = document.getElementById('program-items');
                const programCount = document.getElementById('programs-count');
                
                if (response.ok) {
                    programCount.textContent = `Total Programs: ${programs.length}`;
                    programList.innerHTML = '';
                    programs.forEach(program => {
                        const li = document.createElement('li');
                        li.className = 'flex items-center justify-between';
                        li.innerHTML = `
                            <a href="/api/programs/${program.id}" class="text-blue-600 hover:underline">${program.name}</a>
                            <div>
                                <button onclick="editProgram(${program.id})" class="text-blue-600 hover:text-blue-800 mr-2">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteProgram(${program.id})" class="text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        `;
                        programList.appendChild(li);
                    });
                } else {
                    programCount.textContent = 'Error loading programs';
                    programList.innerHTML = `<p>${programs.error}</p>`;
                }
            } catch (error) {
                document.getElementById('programs-count').textContent = 'Error loading programs';
                document.getElementById('program-items').innerHTML = `<p>Failed to load programs: ${error.message}</p>`;
            }
        }

        // Create a new program
        document.getElementById('create-program').addEventListener('click', async () => {
            const programData = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                national_alignment: document.getElementById('national_alignment').value,
                focus_areas: document.getElementById('focus_areas').value,
                phases: document.getElementById('phases').value
            };

            try {
                const response = await fetch('/api/programs/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(programData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Program created successfully!');
                    fetchPrograms(); // Refresh the list
                    // Clear form
                    document.getElementById('name').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('national_alignment').value = '';
                    document.getElementById('focus_areas').value = '';
                    document.getElementById('phases').value = '';
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to create program: ${error.message}`);
            }
        });

        // Edit a program (prompt-based for simplicity)
        async function editProgram(programId) {
            const programData = {
                name: prompt('Enter new program name:'),
                description: prompt('Enter new description:'),
                national_alignment: prompt('Enter new national alignment:'),
                focus_areas: prompt('Enter new focus areas:'),
                phases: prompt('Enter new phases:')
            };

            // Remove null/undefined fields
            Object.keys(programData).forEach(key => {
                if (!programData[key]) delete programData[key];
            });

            try {
                const response = await fetch(`/api/programs/${programId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(programData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Program updated successfully!');
                    fetchPrograms(); // Refresh the list
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to update program: ${error.message}`);
            }
        }

        // Delete a program
        async function deleteProgram(programId) {
            if (confirm('Are you sure you want to delete this program?')) {
                try {
                    const response = await fetch(`/api/programs/${programId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Program deleted successfully!');
                        fetchPrograms(); // Refresh the list
                    } else {
                        const result = await response.json();
                        alert(`Error: ${result.error}`);
                    }
                } catch (error) {
                    alert(`Failed to delete program: ${error.message}`);
                }
            }
        }

        // Initial fetch
        fetchPrograms();
    </script>
</body>
</html>
