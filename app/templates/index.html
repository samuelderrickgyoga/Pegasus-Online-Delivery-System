<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone Project Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-lg border-r border-gray-100 p-6 flex flex-col">
        <div class="flex items-center mb-10">
            <div class="h-12 w-12 bg-blue-600 rounded-full flex items-center justify-center">
                <i class="fas fa-project-diagram text-white text-xl"></i>
            </div>
            <span class="ml-3 font-bold text-xl text-gray-900">Dashboard</span>
        </div>

        <nav class="flex flex-col space-y-4">
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-list mr-3"></i> Programs
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-building mr-3"></i> Facilities
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-tools mr-3"></i> Services
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-cogs mr-3"></i> Equipment
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-users mr-3"></i> Participants
            </a>
            <a href="#" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200">
                <i class="fas fa-chart-line mr-3"></i> Outcomes
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Capstone Project Dashboard</h1>
            <p class="text-gray-600">Overview of Programs, Facilities, Services, Equipment, Projects, Participants, and Outcomes</p>
        </div>

        <!-- Dashboard Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Example Card -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
                <div class="flex items-center mb-4">
                    <div class="p-3 bg-blue-100 rounded-lg">
                        <i class="fas fa-folder-open text-blue-600 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <h3 class="text-lg font-semibold text-gray-900">Programs</h3>
                        <p id="programs-count" class="text-gray-500">Loading...</p>
                    </div>
                </div>
                <div id="programs-list" class="text-sm text-gray-600"></div>
            </div>
            <!-- Repeat similar cards for Facilities, Services, etc. -->
        </div>
    </main>

</body>
</html>
