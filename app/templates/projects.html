<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Capstone Project Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex">
    <!-- Mobile Menu Button -->
    <button onclick="toggleMobileMenu()" class="lg:hidden fixed top-4 left-4 z-50 p-2 bg-white rounded-md shadow-md">
        <i class="fas fa-bars text-gray-600"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:relative lg:translate-x-0 -translate-x-full transition-transform duration-300 ease-in-out z-40 w-64 bg-white shadow-lg border-r border-gray-100 p-4 lg:p-6 flex flex-col h-full">
        <div class="flex items-center mb-6 lg:mb-10">
            <div class="h-10 lg:h-12 w-10 lg:w-12 bg-blue-600 rounded-full flex items-center justify-center">
                <i class="fas fa-project-diagram text-white text-lg lg:text-xl"></i>
            </div>
            <span class="ml-3 font-bold text-lg lg:text-xl text-gray-900">Dashboard</span>
        </div>
        <nav class="flex flex-col space-y-2 lg:space-y-4">
            <a href="{{ url_for('main.index') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-home mr-3"></i> Home
            </a>
            <a href="{{ url_for('main.programs') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-list mr-3"></i> Programs
            </a>
            <a href="{{ url_for('main.facilities') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-building mr-3"></i> Facilities
            </a>
            <a href="{{ url_for('main.equipment') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-tools mr-3"></i> Equipment
            </a>
            <a href="{{ url_for('main.projects') }}" class="flex items-center text-blue-600 font-semibold p-2 rounded bg-blue-50 text-sm lg:text-base">
                <i class="fas fa-cogs mr-3"></i> Projects
            </a>
            <a href="{{ url_for('main.participants') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-users mr-3"></i> Participants
            </a>
            <a href="{{ url_for('main.outcomes') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-chart-line mr-3"></i> Outcomes
            </a>
            <a href="{{ url_for('main.services') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-wrench mr-3"></i> Services
            </a>
        </nav>
    </aside>
    
    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="hidden lg:hidden fixed inset-0 bg-black bg-opacity-50 z-40" onclick="toggleMobileMenu()"></div>
    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Projects</h1>
            <p class="text-gray-600">Manage and view all capstone projects</p>
        </div>
        
        <!-- Create Project Form -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-plus text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Create New Project</h3>
                </div>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="program_id" class="block text-sm font-medium text-gray-700">Program *</label>
                        <select id="program_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                            <option value="">Select Program</option>
                        </select>
                    </div>
                    <div>
                        <label for="facility_id" class="block text-sm font-medium text-gray-700">Facility *</label>
                        <select id="facility_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                            <option value="">Select Facility</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700">Project Title *</label>
                    <input type="text" id="title" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="nature" class="block text-sm font-medium text-gray-700">Project Nature *</label>
                        <select id="nature" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                            <option value="">Select Nature</option>
                            <option value="Research">Research</option>
                            <option value="Development">Development</option>
                            <option value="Innovation">Innovation</option>
                            <option value="Prototype">Prototype</option>
                            <option value="Commercial">Commercial</option>
                        </select>
                    </div>
                    <div>
                        <label for="prototype_stage" class="block text-sm font-medium text-gray-700">Prototype Stage</label>
                        <select id="prototype_stage" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <option value="">Select Stage</option>
                            <option value="Concept">Concept</option>
                            <option value="Design">Design</option>
                            <option value="Development">Development</option>
                            <option value="Testing">Testing</option>
                            <option value="Production">Production</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="description" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="3"></textarea>
                </div>
                <div>
                    <label for="innovation_focus" class="block text-sm font-medium text-gray-700">Innovation Focus</label>
                    <input type="text" id="innovation_focus" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="e.g., AI/ML, IoT, Robotics">
                </div>
                <div>
                    <label for="testing_requirements" class="block text-sm font-medium text-gray-700">Testing Requirements</label>
                    <textarea id="testing_requirements" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="2" placeholder="Describe testing needs..."></textarea>
                </div>
                <div>
                    <label for="commercialization_plan" class="block text-sm font-medium text-gray-700">Commercialization Plan</label>
                    <textarea id="commercialization_plan" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="2" placeholder="Describe commercialization strategy..."></textarea>
                </div>
                <button id="create-project" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create Project</button>
            </div>
        </div>
        
        <!-- Search and Filter Section -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-green-100 rounded-lg">
                    <i class="fas fa-search text-green-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Search & Filter Projects</h3>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="search-title" placeholder="Search by title..." class="border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                <select id="filter-program" class="border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">All Programs</option>
                </select>
                <select id="filter-facility" class="border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">All Facilities</option>
                </select>
                <button id="apply-filters" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">Apply Filters</button>
            </div>
        </div>
        
        <!-- Projects List -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-cogs text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Project Portfolio</h3>
                    <p id="projects-count" class="text-gray-500">Loading...</p>
                </div>
            </div>
            <div id="projects-list" class="text-sm text-gray-600">
                <div class="grid gap-6" id="project-items"></div>
            </div>
        </div>
    </main>
    
    <script>
        // Mobile menu functionality
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('translate-x-0')) {
                // Close menu
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                // Open menu
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            }
        }

        let programs = [];
        let facilities = [];
        
        // Fetch programs and facilities for dropdowns
        async function fetchDropdownData() {
            try {
                const [programsResponse, facilitiesResponse] = await Promise.all([
                    fetch('/api/programs/'),
                    fetch('/api/facilities/')
                ]);
                
                programs = await programsResponse.json();
                facilities = await facilitiesResponse.json();
                
                // Populate program dropdowns
                const programSelects = [document.getElementById('program_id'), document.getElementById('filter-program')];
                programSelects.forEach(select => {
                    if (select.id === 'filter-program') {
                        select.innerHTML = '<option value="">All Programs</option>';
                    } else {
                        select.innerHTML = '<option value="">Select Program</option>';
                    }
                    programs.forEach(program => {
                        const option = document.createElement('option');
                        option.value = program.id;
                        option.textContent = program.name;
                        select.appendChild(option);
                    });
                });
                
                // Populate facility dropdowns
                const facilitySelects = [document.getElementById('facility_id'), document.getElementById('filter-facility')];
                facilitySelects.forEach(select => {
                    if (select.id === 'filter-facility') {
                        select.innerHTML = '<option value="">All Facilities</option>';
                    } else {
                        select.innerHTML = '<option value="">Select Facility</option>';
                    }
                    facilities.forEach(facility => {
                        const option = document.createElement('option');
                        option.value = facility.id;
                        option.textContent = facility.name;
                        select.appendChild(option);
                    });
                });
                
            } catch (error) {
                console.error('Error fetching dropdown data:', error);
            }
        }
        
        // Fetch all projects
        async function fetchProjects(filters = {}) {
            try {
                let url = '/api/projects/';
                if (Object.keys(filters).length > 0) {
                    const params = new URLSearchParams(filters);
                    url += '?' + params.toString();
                }
                
                const response = await fetch(url);
                const projects = await response.json();
                const projectsList = document.getElementById('project-items');
                const projectsCount = document.getElementById('projects-count');
                
                if (response.ok) {
                    projectsCount.textContent = `Total Projects: ${projects.length}`;
                    projectsList.innerHTML = '';
                    projects.forEach(project => {
                        const program = programs.find(p => p.id === project.program_id);
                        const facility = facilities.find(f => f.id === project.facility_id);
                        const card = document.createElement('div');
                        card.className = 'border rounded-lg p-6 bg-gray-50';
                        card.innerHTML = `
                            <div class="flex items-center justify-between mb-3">
                                <h4 class="text-lg font-semibold text-gray-900">${project.title}</h4>
                                <div class="flex space-x-1">
                                    <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">${project.nature}</span>
                                    ${project.prototype_stage ? `<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">${project.prototype_stage}</span>` : ''}
                                </div>
                            </div>
                            <p class="text-sm text-gray-600 mb-3">${project.description || 'No description available'}</p>
                            <div class="text-xs text-gray-500 mb-3 grid grid-cols-2 gap-2">
                                <p><i class="fas fa-list mr-1"></i><strong>Program:</strong> ${program ? program.name : 'Unknown'}</p>
                                <p><i class="fas fa-building mr-1"></i><strong>Facility:</strong> ${facility ? facility.name : 'Unknown'}</p>
                                ${project.innovation_focus ? `<p><i class="fas fa-lightbulb mr-1"></i><strong>Innovation:</strong> ${project.innovation_focus}</p>` : ''}
                                ${project.testing_requirements ? `<p><i class="fas fa-vial mr-1"></i><strong>Testing:</strong> ${project.testing_requirements.substring(0, 50)}${project.testing_requirements.length > 50 ? '...' : ''}</p>` : ''}
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex space-x-2">
                                    <button onclick="viewParticipants(${project.id})" class="text-purple-600 hover:text-purple-800 text-xs">
                                        <i class="fas fa-users mr-1"></i>Participants
                                    </button>
                                    <button onclick="viewOutcomes(${project.id})" class="text-orange-600 hover:text-orange-800 text-xs">
                                        <i class="fas fa-chart-line mr-1"></i>Outcomes
                                    </button>
                                </div>
                                <div class="flex space-x-2">
                                    <button onclick="editProject(${project.id})" class="text-blue-600 hover:text-blue-800">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteProject(${project.id})" class="text-red-600 hover:text-red-800">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        projectsList.appendChild(card);
                    });
                } else {
                    projectsCount.textContent = 'Error loading projects';
                    projectsList.innerHTML = `<p class="text-red-500">${projects.error}</p>`;
                }
            } catch (error) {
                document.getElementById('projects-count').textContent = 'Error loading projects';
                document.getElementById('project-items').innerHTML = `<p class="text-red-500">Failed to load projects: ${error.message}</p>`;
            }
        }

        // Create new project
        document.getElementById('create-project').addEventListener('click', async () => {
            const projectData = {
                program_id: parseInt(document.getElementById('program_id').value),
                facility_id: parseInt(document.getElementById('facility_id').value),
                title: document.getElementById('title').value,
                nature: document.getElementById('nature').value,
                description: document.getElementById('description').value,
                innovation_focus: document.getElementById('innovation_focus').value,
                prototype_stage: document.getElementById('prototype_stage').value,
                testing_requirements: document.getElementById('testing_requirements').value,
                commercialization_plan: document.getElementById('commercialization_plan').value
            };

            if (!projectData.program_id || !projectData.facility_id || !projectData.title || !projectData.nature) {
                alert('Please fill in all required fields (marked with *)');
                return;
            }

            try {
                const response = await fetch('/api/projects/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(projectData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Project created successfully!');
                    fetchProjects();
                    // Clear form
                    document.getElementById('program_id').value = '';
                    document.getElementById('facility_id').value = '';
                    document.getElementById('title').value = '';
                    document.getElementById('nature').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('innovation_focus').value = '';
                    document.getElementById('prototype_stage').value = '';
                    document.getElementById('testing_requirements').value = '';
                    document.getElementById('commercialization_plan').value = '';
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to create project: ${error.message}`);
            }
        });

        // Apply filters
        document.getElementById('apply-filters').addEventListener('click', () => {
            const filters = {};
            const title = document.getElementById('search-title').value;
            const programId = document.getElementById('filter-program').value;
            const facilityId = document.getElementById('filter-facility').value;
            
            if (title) filters.title = title;
            if (programId) filters.program_id = programId;
            if (facilityId) filters.facility_id = facilityId;
            
            fetchProjects(filters);
        });

        // Edit project
        async function editProject(projectId) {
            try {
                const response = await fetch(`/api/projects/${projectId}`);
                const project = await response.json();
                
                if (response.ok) {
                    const newData = {
                        title: prompt('Enter project title:', project.title),
                        description: prompt('Enter description:', project.description || ''),
                        innovation_focus: prompt('Enter innovation focus:', project.innovation_focus || ''),
                        testing_requirements: prompt('Enter testing requirements:', project.testing_requirements || ''),
                        commercialization_plan: prompt('Enter commercialization plan:', project.commercialization_plan || '')
                    };

                    // Remove null/undefined fields
                    Object.keys(newData).forEach(key => {
                        if (!newData[key]) delete newData[key];
                    });

                    if (Object.keys(newData).length > 0) {
                        const updateResponse = await fetch(`/api/projects/${projectId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newData)
                        });
                        const result = await updateResponse.json();
                        if (updateResponse.ok) {
                            alert('Project updated successfully!');
                            fetchProjects();
                        } else {
                            alert(`Error: ${result.error}`);
                        }
                    }
                } else {
                    alert(`Error fetching project: ${project.error}`);
                }
            } catch (error) {
                alert(`Failed to update project: ${error.message}`);
            }
        }

        // Delete project
        async function deleteProject(projectId) {
            if (confirm('Are you sure you want to delete this project? This will also delete all related participants and outcomes.')) {
                try {
                    const response = await fetch(`/api/projects/${projectId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Project deleted successfully!');
                        fetchProjects();
                    } else {
                        const result = await response.json();
                        alert(`Error: ${result.error}`);
                    }
                } catch (error) {
                    alert(`Failed to delete project: ${error.message}`);
                }
            }
        }

        // View participants for a project
        async function viewParticipants(projectId) {
            try {
                const response = await fetch(`/api/projects/${projectId}/participants`);
                const participants = await response.json();
                if (response.ok) {
                    if (participants.length > 0) {
                        const participantList = participants.map(p => `• ${p.participant.full_name} (${p.role_on_project})`).join('\n');
                        alert(`Participants for this project:\n\n${participantList}`);
                    } else {
                        alert('No participants found for this project.');
                    }
                } else {
                    alert(`Error: ${participants.error}`);
                }
            } catch (error) {
                alert(`Failed to load participants: ${error.message}`);
            }
        }

        // View outcomes for a project
        async function viewOutcomes(projectId) {
            try {
                const response = await fetch(`/api/projects/${projectId}/outcomes`);
                const outcomes = await response.json();
                if (response.ok) {
                    if (outcomes.length > 0) {
                        const outcomeList = outcomes.map(o => `• ${o.title} (${o.outcome_type || 'N/A'})`).join('\n');
                        alert(`Outcomes for this project:\n\n${outcomeList}`);
                    } else {
                        alert('No outcomes found for this project.');
                    }
                } else {
                    alert(`Error: ${outcomes.error}`);
                }
            } catch (error) {
                alert(`Failed to load outcomes: ${error.message}`);
            }
        }

        // Initial fetch
        document.addEventListener('DOMContentLoaded', async () => {
            await fetchDropdownData();
            await fetchProjects();
        });
    </script>
</body>
</html>
