<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Capstone Project Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex">
    <!-- Mobile Menu Button -->
    <button onclick="toggleMobileMenu()" class="lg:hidden fixed top-4 left-4 z-50 p-2 bg-white rounded-md shadow-md">
        <i class="fas fa-bars text-gray-600"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:relative lg:translate-x-0 -translate-x-full transition-transform duration-300 ease-in-out z-40 w-64 bg-white shadow-lg border-r border-gray-100 p-4 lg:p-6 flex flex-col h-full">
        <div class="flex items-center mb-6 lg:mb-10">
            <div class="h-10 lg:h-12 w-10 lg:w-12 bg-blue-600 rounded-full flex items-center justify-center">
                <i class="fas fa-project-diagram text-white text-lg lg:text-xl"></i>
            </div>
            <span class="ml-3 font-bold text-lg lg:text-xl text-gray-900">Dashboard</span>
        </div>
        <nav class="flex flex-col space-y-2 lg:space-y-4">
            <a href="{{ url_for('main.index') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-home mr-3"></i> Home
            </a>
            <a href="{{ url_for('main.programs') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-list mr-3"></i> Programs
            </a>
            <a href="{{ url_for('main.facilities') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-building mr-3"></i> Facilities
            </a>
            <a href="{{ url_for('main.equipment') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-tools mr-3"></i> Equipment
            </a>
            <a href="{{ url_for('main.projects') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-cogs mr-3"></i> Projects
            </a>
            <a href="{{ url_for('main.participants') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-users mr-3"></i> Participants
            </a>
            <a href="{{ url_for('main.outcomes') }}" class="flex items-center text-gray-700 hover:text-blue-600 transition duration-200 p-2 rounded text-sm lg:text-base">
                <i class="fas fa-chart-line mr-3"></i> Outcomes
            </a>
            <a href="{{ url_for('main.services') }}" class="flex items-center text-blue-600 font-semibold p-2 rounded bg-blue-50 text-sm lg:text-base">
                <i class="fas fa-wrench mr-3"></i> Services
            </a>
        </nav>
    </aside>
    
    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="hidden lg:hidden fixed inset-0 bg-black bg-opacity-50 z-40" onclick="toggleMobileMenu()"></div>
    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Services</h1>
            <p class="text-gray-600">Manage and view all facility services</p>
        </div>
        
        <!-- Create Service Form -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-plus text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Create New Service</h3>
                </div>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="facility_id" class="block text-sm font-medium text-gray-700">Facility</label>
                        <select id="facility_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <option value="">Select Facility</option>
                        </select>
                    </div>
                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700">Category</label>
                        <select id="category" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <option value="">Select Category</option>
                            <option value="Training">Training</option>
                            <option value="Development">Development</option>
                            <option value="Testing">Testing</option>
                            <option value="Consultation">Consultation</option>
                            <option value="Support">Support</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Service Name</label>
                    <input type="text" id="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="description" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="3"></textarea>
                </div>
                <div>
                    <label for="skill_type" class="block text-sm font-medium text-gray-700">Skill Type</label>
                    <select id="skill_type" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="">Select Skill Type</option>
                        <option value="Technical">Technical</option>
                        <option value="Business">Business</option>
                        <option value="Design">Design</option>
                        <option value="Research">Research</option>
                        <option value="Management">Management</option>
                    </select>
                </div>
                <button id="create-service" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create Service</button>
            </div>
        </div>
        
        <!-- Services List -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-wrench text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Service List</h3>
                    <p id="services-count" class="text-gray-500">Loading...</p>
                </div>
            </div>
            <div id="services-list" class="text-sm text-gray-600">
                <div class="grid gap-4" id="service-items"></div>
            </div>
        </div>
    </main>
    
    <script>
        // Mobile menu functionality
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('translate-x-0')) {
                // Close menu
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                // Open menu
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            }
        }

        let facilities = [];
        
        // Fetch facilities for dropdown
        async function fetchFacilities() {
            try {
                const response = await fetch('/api/facilities/');
                facilities = await response.json();
                const facilitySelect = document.getElementById('facility_id');
                facilitySelect.innerHTML = '<option value="">Select Facility</option>';
                facilities.forEach(facility => {
                    const option = document.createElement('option');
                    option.value = facility.id;
                    option.textContent = facility.name;
                    facilitySelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching facilities:', error);
            }
        }
        
        // Fetch all services on page load
        async function fetchServices() {
            try {
                const response = await fetch('/api/services/');
                const services = await response.json();
                const serviceList = document.getElementById('service-items');
                const serviceCount = document.getElementById('services-count');
                
                if (response.ok) {
                    serviceCount.textContent = `Total Services: ${services.length}`;
                    serviceList.innerHTML = '';
                    services.forEach(service => {
                        const facility = facilities.find(f => f.id === service.facility_id);
                        const card = document.createElement('div');
                        card.className = 'border rounded-lg p-4 bg-gray-50';
                        card.innerHTML = `
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-semibold text-gray-900">${service.name}</h4>
                                <div class="flex space-x-1">
                                    ${service.category ? `<span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">${service.category}</span>` : ''}
                                    ${service.skill_type ? `<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">${service.skill_type}</span>` : ''}
                                </div>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${service.description || 'No description'}</p>
                            <div class="text-xs text-gray-500">
                                <p><strong>Facility:</strong> ${facility ? facility.name : 'Unknown'}</p>
                            </div>
                            <div class="mt-2 flex justify-end space-x-2">
                                <button onclick="editService(${service.id})" class="text-blue-600 hover:text-blue-800">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteService(${service.id})" class="text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        `;
                        serviceList.appendChild(card);
                    });
                } else {
                    serviceCount.textContent = 'Error loading services';
                    serviceList.innerHTML = `<p class="text-red-500">${services.error}</p>`;
                }
            } catch (error) {
                document.getElementById('services-count').textContent = 'Error loading services';
                document.getElementById('service-items').innerHTML = `<p class="text-red-500">Failed to load services: ${error.message}</p>`;
            }
        }

        // Create a new service
        document.getElementById('create-service').addEventListener('click', async () => {
            const serviceData = {
                facility_id: parseInt(document.getElementById('facility_id').value),
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                skill_type: document.getElementById('skill_type').value
            };

            if (!serviceData.facility_id || !serviceData.name) {
                alert('Please select a facility and enter a service name');
                return;
            }

            try {
                const response = await fetch('/api/services/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(serviceData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Service created successfully!');
                    fetchServices();
                    // Clear form
                    document.getElementById('facility_id').value = '';
                    document.getElementById('name').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('category').value = '';
                    document.getElementById('skill_type').value = '';
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to create service: ${error.message}`);
            }
        });

        // Edit a service
        async function editService(serviceId) {
            const serviceData = {
                name: prompt('Enter new service name:'),
                description: prompt('Enter new description:'),
                category: prompt('Enter new category:'),
                skill_type: prompt('Enter new skill type:')
            };

            Object.keys(serviceData).forEach(key => {
                if (!serviceData[key]) delete serviceData[key];
            });

            try {
                const response = await fetch(`/api/services/${serviceId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(serviceData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Service updated successfully!');
                    fetchServices();
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to update service: ${error.message}`);
            }
        }

        // Delete a service
        async function deleteService(serviceId) {
            if (confirm('Are you sure you want to delete this service?')) {
                try {
                    const response = await fetch(`/api/services/${serviceId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Service deleted successfully!');
                        fetchServices();
                    } else {
                        const result = await response.json();
                        alert(`Error: ${result.error}`);
                    }
                } catch (error) {
                    alert(`Failed to delete service: ${error.message}`);
                }
            }
        }

        // Initial fetch
        document.addEventListener('DOMContentLoaded', async () => {
            await fetchFacilities();
            await fetchServices();
        });
    </script>
</body>
</html>
