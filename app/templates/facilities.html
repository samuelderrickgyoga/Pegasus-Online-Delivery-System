{% extends "base.html" %}

{% block title %}Capstone Project Dashboard{% endblock %}

{% block content %}
        <!-- Header -->
        <div class="mb-6 lg:mb-8">
            <h1 class="text-2xl lg:text-3xl font-bold text-gray-900 mb-2">Facilities</h1>
            <p class="text-sm lg:text-base text-gray-600">Manage and view all facilities</p>
        </div>
        
        <!-- Create Facility Form -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-plus text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Create New Facility</h3>
                </div>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">Facility Name *</label>
                        <input type="text" id="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                    </div>
                    <div>
                        <label for="location" class="block text-sm font-medium text-gray-700">Location *</label>
                        <input type="text" id="location" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="facility_type" class="block text-sm font-medium text-gray-700">Facility Type *</label>
                        <select id="facility_type" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                            <option value="">Select Type</option>
                            <option value="Lab">Lab</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Office">Office</option>
                            <option value="Testing Center">Testing Center</option>
                            <option value="Research Center">Research Center</option>
                        </select>
                    </div>
                    <div>
                        <label for="partner_org" class="block text-sm font-medium text-gray-700">Partner Organization</label>
                        <input type="text" id="partner_org" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="description" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" rows="3"></textarea>
                </div>
                <div>
                    <label for="capabilities" class="block text-sm font-medium text-gray-700">Capabilities</label>
                    <input type="text" id="capabilities" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="e.g., CNC Machines, 3D Printing, PCB Design">
                </div>
                <button id="create-facility" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create Facility</button>
            </div>
        </div>
        
        <!-- Search and Filter Section -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100 mb-6">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-green-100 rounded-lg">
                    <i class="fas fa-search text-green-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Search & Filter</h3>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="search-name" placeholder="Search by name..." class="border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                <select id="filter-type" class="border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">All Types</option>
                    <option value="Lab">Lab</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Office">Office</option>
                    <option value="Testing Center">Testing Center</option>
                    <option value="Research Center">Research Center</option>
                </select>
                <input type="text" id="filter-location" placeholder="Filter by location..." class="border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                <button id="apply-filters" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">Apply Filters</button>
            </div>
        </div>
        
        <!-- Facilities List -->
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <div class="flex items-center mb-4">
                <div class="p-3 bg-blue-100 rounded-lg">
                    <i class="fas fa-building text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-gray-900">Facility List</h3>
                    <p id="facilities-count" class="text-gray-500">Loading...</p>
                </div>
            </div>
            <div id="facilities-list" class="text-sm text-gray-600">
                <div class="grid gap-4" id="facility-items"></div>
            </div>
        </div>
{% endblock %}

{% block scripts %}
    <script>
        // Fetch all facilities on page load
        async function fetchFacilities(filters = {}) {
            try {
                let url = '/api/facilities/';
                if (Object.keys(filters).length > 0) {
                    const params = new URLSearchParams(filters);
                    url += '?' + params.toString();
                }
                
                const response = await fetch(url);
                const facilities = await response.json();
                const facilityList = document.getElementById('facility-items');
                const facilityCount = document.getElementById('facilities-count');
                
                if (response.ok) {
                    facilityCount.textContent = `Total Facilities: ${facilities.length}`;
                    facilityList.innerHTML = '';
                    facilities.forEach(facility => {
                        const card = document.createElement('div');
                        card.className = 'border rounded-lg p-4 bg-gray-50';
                        card.innerHTML = `
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-semibold text-gray-900">${facility.name}</h4>
                                <div class="flex space-x-1">
                                    <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">${facility.facility_type}</span>
                                    ${facility.partner_org ? `<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">${facility.partner_org}</span>` : ''}
                                </div>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${facility.description || 'No description'}</p>
                            <div class="text-xs text-gray-500 mb-2">
                                <p><i class="fas fa-map-marker-alt mr-1"></i><strong>Location:</strong> ${facility.location}</p>
                                ${facility.capabilities ? `<p><i class="fas fa-tools mr-1"></i><strong>Capabilities:</strong> ${facility.capabilities}</p>` : ''}
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex space-x-2">
                                    <button onclick="viewServices(${facility.id})" class="text-purple-600 hover:text-purple-800 text-xs">
                                        <i class="fas fa-cog mr-1"></i>Services
                                    </button>
                                    <button onclick="viewEquipment(${facility.id})" class="text-orange-600 hover:text-orange-800 text-xs">
                                        <i class="fas fa-tools mr-1"></i>Equipment
                                    </button>
                                </div>
                                <div class="flex space-x-2">
                                    <button onclick="editFacility(${facility.id})" class="text-blue-600 hover:text-blue-800">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteFacility(${facility.id})" class="text-red-600 hover:text-red-800">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        facilityList.appendChild(card);
                    });
                } else {
                    facilityCount.textContent = 'Error loading facilities';
                    facilityList.innerHTML = `<p class="text-red-500">${facilities.error}</p>`;
                }
            } catch (error) {
                document.getElementById('facilities-count').textContent = 'Error loading facilities';
                document.getElementById('facility-items').innerHTML = `<p class="text-red-500">Failed to load facilities: ${error.message}</p>`;
            }
        }

        // Create a new facility
        document.getElementById('create-facility').addEventListener('click', async () => {
            const facilityData = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                facility_type: document.getElementById('facility_type').value,
                partner_org: document.getElementById('partner_org').value,
                description: document.getElementById('description').value,
                capabilities: document.getElementById('capabilities').value
            };

            if (!facilityData.name || !facilityData.location || !facilityData.facility_type) {
                alert('Please fill in all required fields (marked with *)');
                return;
            }

            try {
                const response = await fetch('/api/facilities/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(facilityData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Facility created successfully!');
                    fetchFacilities();
                    // Clear form
                    document.getElementById('name').value = '';
                    document.getElementById('location').value = '';
                    document.getElementById('facility_type').value = '';
                    document.getElementById('partner_org').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('capabilities').value = '';
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to create facility: ${error.message}`);
            }
        });

        // Apply filters
        document.getElementById('apply-filters').addEventListener('click', () => {
            const filters = {};
            const name = document.getElementById('search-name').value;
            const type = document.getElementById('filter-type').value;
            const location = document.getElementById('filter-location').value;
            
            if (name) filters.name = name;
            if (type) filters.type = type;
            if (location) filters.location = location;
            
            fetchFacilities(filters);
        });

        // Edit a facility (modal-based)
        async function editFacility(facilityId) {
            try {
                const response = await fetch(`/api/facilities/${facilityId}`);
                const facility = await response.json();

                if (response.ok) {
                    // Populate modal fields
                    document.getElementById('edit-facility-name').value = facility.name || '';
                    document.getElementById('edit-facility-location').value = facility.location || '';
                    document.getElementById('edit-facility-facility_type').value = facility.facility_type || '';
                    document.getElementById('edit-facility-partner_org').value = facility.partner_org || '';
                    document.getElementById('edit-facility-description').value = facility.description || '';
                    document.getElementById('edit-facility-capabilities').value = facility.capabilities || '';

                    // Store facility ID for save
                    document.getElementById('edit-facility-modal').dataset.facilityId = facilityId;

                    // Show modal
                    document.getElementById('edit-facility-modal').classList.remove('hidden');
                } else {
                    alert(`Error fetching facility: ${facility.error}`);
                }
            } catch (error) {
                alert(`Failed to load facility: ${error.message}`);
            }
        }

        // Save facility edit
        async function saveFacilityEdit() {
            const facilityId = document.getElementById('edit-facility-modal').dataset.facilityId;
            const facilityData = {
                name: document.getElementById('edit-facility-name').value.trim(),
                location: document.getElementById('edit-facility-location').value.trim(),
                facility_type: document.getElementById('edit-facility-facility_type').value.trim(),
                partner_org: document.getElementById('edit-facility-partner_org').value.trim(),
                description: document.getElementById('edit-facility-description').value.trim(),
                capabilities: document.getElementById('edit-facility-capabilities').value.trim()
            };

            // Remove empty fields for partial update
            Object.keys(facilityData).forEach(key => {
                if (!facilityData[key]) delete facilityData[key];
            });

            if (Object.keys(facilityData).length === 0) {
                alert('Please fill at least one field to update.');
                return;
            }

            try {
                const response = await fetch(`/api/facilities/${facilityId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(facilityData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Facility updated successfully!');
                    closeFacilityEditModal();
                    fetchFacilities();
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                alert(`Failed to update facility: ${error.message}`);
            }
        }

        // Close facility edit modal
        function closeFacilityEditModal() {
            document.getElementById('edit-facility-modal').classList.add('hidden');
        }

        // Delete a facility
        async function deleteFacility(facilityId) {
            if (confirm('Are you sure you want to delete this facility? This action cannot be undone.')) {
                try {
                    const response = await fetch(`/api/facilities/${facilityId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Facility deleted successfully!');
                        fetchFacilities();
                    } else {
                        const result = await response.json();
                        alert(`Error: ${result.error}`);
                    }
                } catch (error) {
                    alert(`Failed to delete facility: ${error.message}`);
                }
            }
        }

        // View services for a facility
        async function viewServices(facilityId) {
            try {
                const response = await fetch(`/api/facilities/${facilityId}/services`);
                const services = await response.json();
                if (response.ok) {
                    if (services.length > 0) {
                        const serviceList = services.map(s => `• ${s.name} (${s.category || 'N/A'})`).join('\n');
                        alert(`Services for this facility:\n\n${serviceList}`);
                    } else {
                        alert('No services found for this facility.');
                    }
                } else {
                    alert(`Error: ${services.error}`);
                }
            } catch (error) {
                alert(`Failed to load services: ${error.message}`);
            }
        }

        // View equipment for a facility
        async function viewEquipment(facilityId) {
            try {
                const response = await fetch(`/api/facilities/${facilityId}/equipment`);
                const equipment = await response.json();
                if (response.ok) {
                    if (equipment.length > 0) {
                        const equipmentList = equipment.map(e => `• ${e.name} (${e.usage_domain || 'N/A'})`).join('\n');
                        alert(`Equipment for this facility:\n\n${equipmentList}`);
                    } else {
                        alert('No equipment found for this facility.');
                    }
                } else {
                    alert(`Error: ${equipment.error}`);
                }
            } catch (error) {
                alert(`Failed to load equipment: ${error.message}`);
            }
        }

        // Initial fetch
        document.addEventListener('DOMContentLoaded', () => {
            fetchFacilities();
        });
    </script>
{% endblock %}
